<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="light-mode">
    <div class="app-wrapper">

        <nav class="top-nav">
            <button id="theme-toggle" aria-label="Activar modo oscuro">🌙 Modo Oscuro</button>
        </nav>

        <header>
            <h1>TaskFlow<span>.</span></h1>
            <p>Tu centro de productividad personal</p>
        </header>

        <main class="main-content">

            <section class="input-card">
                <form id="task-form">
                    <div class="input-group">
                        <label for="task-input" class="sr-only">Nueva tarea</label>
                        <input type="text" id="task-input" placeholder="¿Qué tienes en mente?" required>

                        <label for="searchInput" class="sr-only">Buscar tareas</label>
                        <input type="text" id="searchInput" placeholder="Buscar tareas...">

                        <label for="priority-select" class="sr-only">Prioridad</label>
                        <select id="priority-select">
                            <option value="low">Baja</option>
                            <option value="medium">Media</option>
                            <option value="high">Urgente 🔥</option>
                        </select>

                        <button type="submit" id="add-btn">Añadir</button>
                    </div>
                </form>
            </section>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>

                <div class="sort-container">
                    <label for="sort-select">Ordenar:</label>
                    <select id="sort-select">
                        <option value="newest">Más recientes</option>
                        <option value="alpha">Alfabético</option>
                        <option value="priority">Prioridad</option>
                    </select>
                </div>
            </div>

            <div class="dashboard">
                <section class="tasks-container">
                    <ul id="task-list" aria-label="Lista de tareas"></ul>
                </section>

                <aside class="stats-panel" aria-label="Panel de estadísticas">
                    <h3>Tu Progreso</h3>
                    <div class="progress-container" role="progressbar" aria-valuemin="0" aria-valuemax="100">
                        <div id="progress-bar"></div>
                    </div>
                    <div class="stat-item">
                        <span>Total:</span> <strong id="total-tasks">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Completadas:</span> <strong id="stats-done">0</strong>
                    </div>
                </aside>
            </div>

        </main>

        <footer class="main-footer">
            <p>&copy; 2026 - Trinidad Nepi</p>
        </footer>

    </div>

    <script src="./app.js"></script>
</body>
</html>
