<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="light-mode">
    <div class="app-wrapper">
        <nav class="top-nav">
            <button id="theme-toggle">🌙 Modo Oscuro</button>
        </nav>

        <header>
            <h1>TaskFlow<span>.</span></h1>
            <p>Tu centro de productividad personal</p>
        </header>

        <main class="main-content">
            <section class="input-card">
                <form id="task-form">
                    <div class="input-group">
                        <input type="text" id="task-input" placeholder="¿Qué tienes en mente?" required>
                        <input type="text" id="searchInput" placeholder="Buscar tareas...">
                        <select id="task-priority">
                            <option value="low">Baja</option>
                            <option value="medium">Media</option>
                            <option value="high">Urgente 🔥</option>
                        </select>
                        <button type="submit" id="add-btn">Añadir</button>
                    </div>
                </form>
            </section>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Completadas</button>
            </div>

            <div class="dashboard">
                <section class="tasks-container">
                    <ul id="task-list"></ul>
                </section>

                <aside class="stats-panel">
                    <h3>Tu Progreso</h3>
                    <div class="progress-container">
                        <div id="progress-bar"></div>
                    </div>
                    <div class="stat-item">
                        <span>Total:</span> <strong id="total-tasks">0</strong>
                    </div>
                    <div class="stat-item">
                        <span>Completadas:</span> <strong id="completed-tasks">0</strong>
                    </div>
                </aside>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
